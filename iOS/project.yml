name: Tipjar
options:
  bundleIdPrefix: com.shimondeitel.tipjarapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tipjar:
    type: application
    platform: iOS
    sources:
      - path: Tipjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tipjarapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tipjar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TipjarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TipjarTests
      - path: Tipjar.storekit
    dependencies:
      - target: Tipjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tipjarapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TipjarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TipjarUITests
    dependencies:
      - target: Tipjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tipjarapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tipjar:
    build:
      targets:
        Tipjar: all
        TipjarTests: [test]
        TipjarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tipjar.storekit
    test:
      config: Debug
      storeKitConfiguration: Tipjar.storekit
      targets:
        - TipjarTests
        - TipjarUITests
    archive:
      config: Release
